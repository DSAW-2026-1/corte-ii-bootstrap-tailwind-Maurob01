<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <title>Stats Preview Card - Menú de Entrega</title>
    
    <style>
        :root {
            --bg: #090b1a;
            --accent: #aa5cdb;
            --card: #1b1938;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: white;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
        }

        .nav-container {
            display: flex;
            gap: 20px;
        }

        .btn-nav {
            text-decoration: none;
            color: white;
            padding: 15px 30px;
            border: 2px solid var(--accent);
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-nav:hover {
            background-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(170, 92, 219, 0.3);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <h1>Proyecto: Stats Preview Card</h1>
    <p>Selecciona la versión que deseas revisar para la evaluación:</p>

    <nav class="nav-container">
        <a href="bootstrap.html" class="btn-nav">Versión Bootstrap </a>
        <a href="tailwind.html" class="btn-nav">Versión Tailwind </a>
    </nav>

    <div class="footer">
        Corte II - Programación Web - 2026
    </div>

</body>
</html>
