<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stats Preview Card - Bootstrap Version</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #090b1a; 
            font-family: 'Inter', sans-serif; 
            color: white; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card-custom { 
            background-color: #1b1938; 
            border-radius: 15px; 
            overflow: hidden; 
            border: none; 
            max-width: 1000px;
        }
  
        .img-container { 
            background-color: #aa5cdb; 
        }
        .img-container img { 
            mix-blend-mode: multiply; 
            opacity: 0.75; 
            object-fit: cover; 
            width: 100%; 
            height: 100%; 
        }
        .accent { color: #aa5cdb; }
        .stat-label { 
            font-family: 'Lexend Deca', sans-serif;
            text-transform: uppercase; 
            font-size: 0.7rem; 
            opacity: 0.6; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <main class="container p-4">
        <div class="card-custom shadow-lg">
            <div class="row g-0 flex-column-reverse flex-lg-row">
                
                <div class="col-lg-6 p-4 p-md-5 text-center text-lg-start">
                    <h1 class="fw-bold mb-4">
                        Get <span class="accent">insights</span> that help your business grow.
                    </h1>
                    <p class="text-white-50 mb-5">
                        Discover the benefits of data analytics and make better decisions 
                        regarding revenue, customer experience, and overall efficiency.
                    </p>

                    <div class="row gy-4 gy-lg-0">
                        <div class="col-lg-4">
                            <h2 class="h4 fw-bold mb-0">10k+</h2>
                            <p class="stat-label">companies</p>
                        </div>
                        <div class="col-lg-4">
                            <h2 class="h4 fw-bold mb-0">314</h2>
                            <p class="stat-label">templates</p>
                        </div>
                        <div class="col-lg-4">
                            <h2 class="h4 fw-bold mb-0">12M+</h2>
                            <p class="stat-label">queries</p>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6 img-container">
                    <picture>
                        <source srcset="images/image-header-desktop.jpg" media="(min-width: 992px)">
                        <img src="images/image-header-mobile.jpg" alt="Office team" class="img-fluid">
                    </picture>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
